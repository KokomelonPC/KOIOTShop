<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KOIOT Shop | Product Orders</title><link rel="icon" type="image/png" href="favicon.png">
<style>
:root{--bg-sidebar:linear-gradient(180deg,rgba(15,23,42,.98),rgba(30,41,59,.96));--text-main:#0f172a;--text-soft:#475569;--text-muted:#94a3b8;--line-soft:rgba(148,163,184,.18);--shadow-xl:0 28px 70px rgba(15,23,42,.18);--shadow-md:0 12px 28px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;color:var(--text-main);background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 48%,#f8fafc 100%)}.layout{display:flex;min-height:100vh}.sidebar{width:280px;padding:26px 22px;color:#fff;background:var(--bg-sidebar);position:sticky;top:0;height:100vh}.brand-box{padding:22px 18px;border-radius:24px;background:linear-gradient(135deg,rgba(37,99,235,.24),rgba(14,165,233,.16),rgba(16,185,129,.24))}.brand-box h2{margin:0;font-size:1.45rem}.brand-box p{margin:10px 0 0;color:rgba(226,232,240,.88);line-height:1.7}.menu{margin-top:28px}.menu-label{margin:0 0 14px;padding-left:10px;font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:rgba(148,163,184,.78)}.menu a,.menu-toggle{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;margin-bottom:10px;border:none;border-radius:14px;background:transparent;color:#dbeafe;font:inherit;font-size:16px;text-align:left;text-decoration:none;cursor:pointer}.menu a:hover{background:rgba(59,130,246,.16)}.menu-toggle.active{color:#fff;background:linear-gradient(135deg,rgba(37,99,235,.8),rgba(16,185,129,.78));box-shadow:0 14px 26px rgba(37,99,235,.22)}.menu-toggle span{margin-left:auto}.product-submenu{display:grid;gap:8px;margin:-2px 0 12px 22px;padding-left:12px;border-left:1px solid rgba(148,163,184,.28)}.product-submenu a{margin-bottom:0;padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.18)}.product-submenu a.active{color:#fff;background:rgba(16,185,129,.48)}.main{flex:1;padding:26px}.hero{padding:36px;border-radius:34px;color:#fff;background:linear-gradient(135deg,rgba(15,118,110,.96),rgba(37,99,235,.92),rgba(79,70,229,.88));box-shadow:var(--shadow-xl)}.eyebrow{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.16)}.hero h1{margin:18px 0 0;font-size:clamp(2rem,4vw,3.2rem)}.hero p{margin:14px 0 0;max-width:760px;color:rgba(239,246,255,.9);line-height:1.8}.content-shell{max-width:1100px;margin:28px auto 0}.panel{background:rgba(255,255,255,.84);border:1px solid rgba(255,255,255,.92);border-radius:24px;padding:24px;box-shadow:var(--shadow-md)}.empty-state{padding:22px;border-radius:18px;background:#f8fafc;border:1px solid var(--line-soft);color:var(--text-soft);line-height:1.7}.order-list{display:grid;gap:12px}.order-item{padding:16px;border-radius:16px;background:#f8fafc;border:1px solid var(--line-soft)}.order-item strong{display:block;margin-bottom:6px}.order-meta{color:var(--text-soft);line-height:1.6}footer{margin-top:26px;padding:24px;border-radius:24px;background:rgba(15,23,42,.96);color:var(--text-muted);text-align:center}@media(max-width:900px){.layout{flex-direction:column}.sidebar{width:100%;height:auto;position:relative}.main{padding:18px}.hero{padding:28px 24px;border-radius:28px}}
</style>
<link rel="stylesheet" href="retro_theme.css">
</head>
<body><div class="layout"><aside class="sidebar"><div class="brand-box"><h2>🛒 KOIOT Shop</h2><p>รายการสั่งซื้อสินค้าของคุณในระบบร้านค้า</p></div><nav class="menu"><p class="menu-label">สินค้าและบริการของเรา</p><button class="menu-toggle active" type="button">🛒 สินค้า KOIOT Shop <span>▴</span></button><div class="product-submenu"><a href="koiot_products.html">หน้าแรกสินค้า</a><a href="product_account.html">My Account</a><a href="product_orders.html" class="active">My Orders</a><a href="shipping_address.html">ที่อยู่จัดส่ง</a></div></nav></aside><main class="main"><section class="hero"><span class="eyebrow">Product Orders</span><h1 id="orderWelcome">รายการสั่งซื้อสินค้า</h1><p>หน้านี้แสดงคำสั่งซื้อสินค้าและสถานะจากแอดมิน</p></section><div class="content-shell"><section class="panel"><h2>รายการสินค้า</h2><div id="ordersContainer" class="order-list"><div class="empty-state">กำลังตรวจสอบบัญชี...</div></div></section><footer>KOIOT Shop</footer></div></main></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
const PRODUCT_API_URL = "https://script.google.com/macros/s/AKfycbxmE38FRHagWNxzFz8htUBh_2V212bvEOElHwQbYZThoQQJyXcI9JAJI-b3b0u279g/exec";
const firebaseConfig={apiKey:"AIzaSyBN02k5-YhZc1uitpEfMfVpsPLAPYKQs7A",authDomain:"myshop-c3983.firebaseapp.com",projectId:"myshop-c3983"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);
onAuthStateChanged(auth,async(user)=>{if(!user){alert("กรุณา Login ก่อน");window.location.href="login.html";return;}document.getElementById("orderWelcome").innerText="รายการสั่งซื้อของ " + (user.displayName || user.email);await loadProductOrders(user);});
async function loadProductOrders(user){const box=document.getElementById("ordersContainer");try{const res=await fetch(`${PRODUCT_API_URL}?action=getProductOrdersByEmail&email=${encodeURIComponent(user.email||"")}&uid=${encodeURIComponent(user.uid)}`);const data=await res.json();const orders=data.orders||[];if(!orders.length){box.innerHTML='<div class="empty-state">ยังไม่มีรายการสั่งซื้อสินค้า</div>';return;}box.innerHTML=orders.map(order=>`<div class="order-item"><strong>${order.orderId||"คำสั่งซื้อสินค้า"}</strong><div class="order-meta">${order.item||"-"}<br>ยอด: ${Number(order.amount||0).toLocaleString("th-TH")} บาท<br>สถานะ: ${order.status||"รอตรวจสอบ"}<br>ข้อความจากแอดมิน: ${order.adminReply||"-"}</div></div>`).join("");}catch(error){box.innerHTML='<div class="empty-state">ยังไม่สามารถดึงรายการได้ กรุณาลองใหม่อีกครั้ง</div>';}}
</script>
